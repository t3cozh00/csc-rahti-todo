[tool.black]
line-length = 88
target-version = ['py38']
skip-magic-trailing-comma = true
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.coverage
  | \.mypy_cache
  | \.tox
  | \.ve
  | _build
  | build
  | dist
)/
'''

[tool.isort]
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
ensure_newline_before_comments = true
use_parentheses = true
skip_gitignore = true
skip_glob = ['.ve', '.git']

# Fix: Force setuptools to discover only the 'main' directory.
# This prevents flat-layout discovery errors caused by conflict with the parallel 'docker' directory during cloud (S2I) deployment.
[tool.setuptools.packages.find]
include = ["main", "main.*"]